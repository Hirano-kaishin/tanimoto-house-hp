<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>たにもとの家｜江田島の匠</title>
    <meta name="description" content="たにもとの家（広島県 江田島）。設計から施工まで。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --white: #ffffff;
            --warm-50: #f5f0eb;
            --warm-100: #e8e0d8;
            --warm-700: #5c4f43;
            --warm-800: #3d3429;
            --warm-900: #2a231b;
            --accent-light: #b09a7c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif;
            color: var(--warm-800);
            background: #000;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        a { color: inherit; text-decoration: none; }

        .container { width: min(1140px, 90vw); margin: 0 auto; }

        /* ── Header ── */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .header__inner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 0; gap: 16px;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand__main {
            font-family: "Noto Serif JP", serif;
            font-size: 22px; font-weight: 700;
            color: var(--white);
            letter-spacing: 0.06em;
        }
        .brand__sub {
            font-size: 11px; font-weight: 500;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.12em;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 999px;
        }

        .nav { display: flex; align-items: center; gap: 4px; }
        .nav a {
            font-size: 14px; font-weight: 500;
            color: rgba(255,255,255,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .nav__cta {
            background: transparent !important;
            color: rgba(255,255,255,0.7) !important;
            font-weight: 500 !important;
            padding: 8px 16px !important;
            border-radius: 8px !important;
        }
        .nav__cta:hover { color: #fff !important; }

        .hamburger {
            display: none; background: none; border: none; cursor: pointer;
            width: 32px; height: 32px; position: relative;
        }
        .hamburger span {
            display: block; width: 20px; height: 2px;
            background: #fff; border-radius: 2px;
            position: absolute; left: 6px; transition: all 0.3s;
        }
        .hamburger span:nth-child(1) { top: 9px; }
        .hamburger span:nth-child(2) { top: 15px; }
        .hamburger span:nth-child(3) { top: 21px; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav {
                display: none; position: absolute; top: 100%; left: 0; right: 0;
                background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
                flex-direction: column; padding: 16px;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            .nav.open { display: flex; }
            .nav a { width: 100%; text-align: center; padding: 16px; font-size: 16px; }

            .hero { height: 100vh; height: 100svh; }
            .hero__bg { animation: none; }
            .hero__content {
                max-width: 100%;
                padding: 0 0 70px;
                justify-content: flex-end;
            }
            .hero__kicker { margin-bottom: 10px; font-size: 10px; letter-spacing: 0.15em; }
            .hero h1 { font-size: 4.8vw; line-height: 1.5; }
            .hero h1 .h1--line1,
            .hero h1 .h1--line2 { white-space: nowrap; }
            .hero__lead { font-size: 12px; margin-top: 10px; line-height: 1.7; }
            .hero__buttons { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; margin-top: 18px; }
            .hero__buttons .btn { padding: 14px 8px !important; font-size: 14px !important; border-radius: 10px; }
            .bottom-bar { padding: 10px 0; }
            .bottom-bar__inner { gap: 16px; font-size: 11px; }
        }

        /* ── Full-screen Hero ── */
        .hero {
            position: relative;
            width: 100%; height: 100vh;
            overflow: hidden;
        }
        .hero__bg {
            position: absolute; inset: 0;
            background-image: url('./images/IMG_6583.PNG');
            background-size: cover;
            background-position: center 40%;
            animation: heroZoom 20s ease-in-out infinite alternate;
        }
        @keyframes heroZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }
        .hero__overlay {
            position: absolute; inset: 0;
            background:
                linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.5) 100%),
                linear-gradient(90deg, rgba(0,0,0,0.5) 0%, transparent 60%);
        }
        .hero__content {
            position: relative; z-index: 2;
            height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            max-width: 580px;
            padding: 80px 0 60px;
        }
        .hero__kicker {
            display: inline-flex; align-items: center; gap: 10px;
            font-size: 12px; font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--accent-light);
            margin-bottom: 24px;
        }
        .hero__kicker::before {
            content: ''; display: block;
            width: 32px; height: 1px;
            background: var(--accent-light);
        }
        .hero h1 {
            font-family: "Noto Serif JP", serif;
            font-size: clamp(26px, 4.2vw, 50px);
            font-weight: 700;
            line-height: 1.4;
            color: var(--white);
            letter-spacing: 0.02em;
        }
        .hero__lead {
            margin-top: 24px;
            font-size: 15px;
            line-height: 2;
            color: rgba(255,255,255,0.75);
        }
        .hero__buttons {
            margin-top: 36px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px;
            font-size: 14px; font-weight: 700;
            padding: 16px 8px;
            border-radius: 12px; border: none;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .hero__buttons .btn {
            font-size: min(1.15vw, 13px);
            padding: 16px 12px;
        }
        .btn--glass {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.25);
        }
        .btn--glass:hover {
            background: rgba(255,255,255,0.22);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .btn--primary {
            background: var(--white);
            color: var(--warm-900);
        }
        .btn--primary:hover {
            background: var(--warm-50);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        /* ── Bottom bar ── */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 14px 0;
        }
        .bottom-bar__inner {
            display: flex; align-items: center; justify-content: center;
            gap: 32px; flex-wrap: wrap;
            font-size: 13px; color: rgba(255,255,255,0.5);
        }
        .bottom-bar__inner a {
            color: rgba(255,255,255,0.6);
            transition: color 0.2s;
        }
        .bottom-bar__inner a:hover { color: #fff; }

        /* Fade-in animation */
        .hero__content > * {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease forwards;
        }
        .hero__content > *:nth-child(1) { animation-delay: 0.2s; }
        .hero__content > *:nth-child(2) { animation-delay: 0.4s; }
        .hero__content > *:nth-child(3) { animation-delay: 0.6s; }
        .hero__content > *:nth-child(4) { animation-delay: 0.8s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<!-- Header -->
<header class="header">
    <div class="container header__inner">
        <a href="./index.html" class="brand">
            <div class="brand__main">たにもとの家</div>
            <div class="brand__sub">江田島の匠</div>
        </a>
        <button class="hamburger" onclick="document.querySelector('.nav').classList.toggle('open')" aria-label="メニュー">
            <span></span><span></span><span></span>
        </button>
        <nav class="nav">
            <a href="./works.html">施工事例</a>
            <a href="./estimate.html">見積シミュレーション</a>
            <a href="./about.html">会社紹介</a>
            <a href="./contact.html" class="nav__cta">お問い合わせ</a>
        </nav>
    </div>
</header>

<!-- Full-screen Hero -->
<section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>
    <div class="container hero__content">
        <div class="hero__kicker">ETAJIMA / DESIGN &amp; BUILD</div>
        <h1><span class="h1--line1">遊び心と上品さ。</span><br><span class="h1--line2">"任せて安心"の家づくり。</span></h1>
        <p class="hero__lead">
            代表・谷本信志が設計から施工まで手がけ、<br />
            暮らしの"好き"が長く続く住まいをお届けします。
        </p>
        <div class="hero__buttons">
            <a class="btn btn--glass" href="./works.html">施工事例</a>
            <a class="btn btn--glass" href="./estimate.html">見積シミュレーション</a>
            <a class="btn btn--glass" href="./about.html">会社紹介</a>
            <a class="btn btn--glass" href="./contact.html">お問い合わせ</a>
        </div>
    </div>
</section>

<!-- Bottom bar -->
<div class="bottom-bar">
    <div class="container bottom-bar__inner">
        <span>&copy; たにもとの家</span>
        <a href="./index.html" title="ホーム" style="opacity:.5;display:inline-flex">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <a href="./admin.html" title="スタッフ専用" style="opacity:.35;display:inline-flex">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
    </div>
</div>

<script>
document.querySelectorAll('.nav a').forEach(a => {
    a.addEventListener('click', () => document.querySelector('.nav').classList.remove('open'));
});

// Load custom hero background from admin
(function(){
    var img = localStorage.getItem('tanimoto_admin_img_hero_bg');
    if (img) {
        document.querySelector('.hero__bg').style.backgroundImage = 'url(' + img + ')';
    }
})();
</script>

</body>
</html>
